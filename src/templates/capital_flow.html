<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }}</title>
<link rel="stylesheet" href="{{ static_url('capital_flow.css') }}">
</head>
<body>
<div class="header">
  <h1>{{ title }}</h1>
</div>

<div class="container">
  <div class="section-nav" aria-label="资金流向分组导航">
    <div class="section-links">
      <a href="#capital-section-total" class="active" data-section-link="total">总览</a>
      <a href="#capital-section-broad" data-section-link="broad">宽基</a>
      <a href="#capital-section-a-industry" data-section-link="a_industry">A股行业</a>
      <a href="#capital-section-hk-industry" data-section-link="hk_industry">港股行业</a>
      <a href="#capital-section-strategy" data-section-link="strategy">策略因子</a>
    </div>
  </div>
  <div class="data-status" id="dataStatus"></div>

  <section class="panel summary-panel" id="capital-section-total" data-section="total">
    <div class="panel-header">
      <span>ETF净申购金额</span>
    </div>
    <div class="flow-cards" id="totalFlowCards"></div>
  </section>

  <section class="panel" id="capital-section-broad" data-section="broad">
    <div class="panel-header">
      <span>宽基被动ETF <span class="help-tip" tabindex="0" aria-label="宽基被动 ETF 优先按基金跟踪基准归类为纯宽基指数，并要求被动指数型，排除增强、价值、成长、红利低波等策略变体；跟踪基准明确为宽基时优先于名称中的行业词。仅展示同一宽基指数 ETF 最新规模合计超过 20 亿元的聚合项。表格口径：当日涨跌幅为最新交易日规模加权涨跌幅；5日成交均值占比 = 近5个交易日逐日计算 场内成交额 / 当日期初 ETF 规模 后取均值；净申购金额按窗口内每日份额日期相邻差逐日乘以同日单位净值后累加，同日净值缺失时用收盘价估算，状态栏会标记净申购估值口径；净申购占比 = 窗口净申购金额 / 窗口期初 ETF 规模，用于衡量资金流入强度。">?</span></span>
    </div>
    <div class="table-wrap"><table id="broadTable"></table></div>
  </section>

  <section class="panel" id="capital-section-a-industry" data-section="a_industry">
    <div class="panel-header">
      <span>A股行业 <span class="help-tip" tabindex="0" aria-label="A 股行业只按 ETF 跟踪指数归类：先使用标准指数映射，再使用指数名称规则；未匹配到标准指数规则的 ETF 不纳入行业聚合。货币、现金、债券、转债等非权益 ETF 不纳入行业/主题资金流向。仅展示同一主题 ETF 最新规模合计超过 20 亿元的行业/主题。表格口径：当日涨跌幅为最新交易日规模加权涨跌幅；5日成交均值占比 = 近5个交易日逐日计算 场内成交额 / 当日期初 ETF 规模 后取均值；净申购金额按窗口内每日份额变动逐日乘以同日单位净值后累加，同日净值缺失时用收盘价估算，状态栏会标记净申购估值口径；净申购占比 = 窗口净申购金额 / 窗口期初 ETF 规模，用于衡量资金流入强度。">?</span></span>
    </div>
    <div class="table-wrap"><table id="aIndustryTable"></table></div>
  </section>

  <section class="panel" id="capital-section-hk-industry" data-section="hk_industry">
    <div class="panel-header">
      <span>港股行业 <span class="help-tip" tabindex="0" aria-label="港股行业只按 ETF 跟踪指数归类：先使用标准指数映射，再使用指数名称规则；未匹配到标准指数规则的 ETF 不纳入行业聚合。货币、现金、债券、转债等非权益 ETF 不纳入行业/主题资金流向。仅展示同一主题 ETF 最新规模合计超过 20 亿元的行业/主题。表格口径：当日涨跌幅为最新交易日规模加权涨跌幅；5日成交均值占比 = 近5个交易日逐日计算 场内成交额 / 当日期初 ETF 规模 后取均值；净申购金额按窗口内每日份额变动逐日乘以同日单位净值后累加，同日净值缺失时用收盘价估算，状态栏会标记净申购估值口径；净申购占比 = 窗口净申购金额 / 窗口期初 ETF 规模，用于衡量资金流入强度。">?</span></span>
    </div>
    <div class="table-wrap"><table id="hkIndustryTable"></table></div>
  </section>

  <section class="panel" id="capital-section-strategy" data-section="strategy">
    <div class="panel-header">
      <span>策略因子 <span class="help-tip" tabindex="0" aria-label="策略因子 ETF 只按跟踪指数归类，覆盖红利、红利低波、价值、质量、成长、现金流等明确 Smart Beta 或风格因子指数；指数增强属于主动增强，不纳入本表。这些 ETF 不并入行业表，避免污染行业资金流。仅展示同一策略因子 ETF 最新规模合计超过 20 亿元的聚合项。表格口径：当日涨跌幅为最新交易日规模加权涨跌幅；5日成交均值占比 = 近5个交易日逐日计算 场内成交额 / 当日期初 ETF 规模 后取均值；净申购金额按窗口内每日份额变动逐日乘以同日单位净值后累加，同日净值缺失时用收盘价估算，状态栏会标记净申购估值口径；净申购占比 = 窗口净申购金额 / 窗口期初 ETF 规模，用于衡量资金流入强度。">?</span></span>
    </div>
    <div class="table-wrap"><table id="strategyTable"></table></div>
  </section>

</div>

<script src="{{ static_url('capital_flow.js') }}"></script>
</body>
</html>
